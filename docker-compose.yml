services:
  postgres:
    image: postgres:16-alpine
    container_name: hymnplay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hymnplay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hymnplay}
      POSTGRES_DB: ${POSTGRES_DB:-hymnplay}
    ports:
      - "5432:5432"
    volumes:
      - hymnplay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hymnplay} -d ${POSTGRES_DB:-hymnplay}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hymnplay_postgres_data:
    name: hymnplay_postgres_data
